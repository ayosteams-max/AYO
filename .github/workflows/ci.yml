name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgis/postgis:17-3.6-alpine@sha256:88c78b602e7f2340ed46a090b78c96e9291d249517d50ea03a1cafb82d33ebe2
        env:
          POSTGRES_DB: ayo_test
          POSTGRES_PASSWORD: ayo_test_password
          POSTGRES_USER: ayo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ayo_test -d ayo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AYO_TEST_DATABASE_URL: postgresql+psycopg://ayo_test:ayo_test_password@127.0.0.1:5432/ayo_test
      DEBUG: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: .python-version

      - name: Install uv
        run: python -m pip install "uv==0.11.28"

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Verify lock file is current
        run: uv lock --check

      - name: Create certification evidence directory
        run: |
          mkdir -p certification-evidence
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          manifest = json.loads(
              Path("quality/evidence/manifest.template.json").read_text(encoding="utf-8")
          )
          manifest["commit_sha"] = os.environ["GITHUB_SHA"]
          manifest["workflow_run"] = (
              f"{os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}"
              f"/actions/runs/{os.environ['GITHUB_RUN_ID']}"
          )
          Path("certification-evidence/manifest.json").write_text(
              json.dumps(manifest, indent=2) + "\n",
              encoding="utf-8",
          )
          PY
          uv run --locked pytest --markers > certification-evidence/pytest-markers.txt

      - name: Check formatting
        run: uv run --locked ruff format --check . | tee certification-evidence/ruff-format.txt

      - name: Lint
        run: uv run --locked ruff check . | tee certification-evidence/ruff-check.txt

      - name: Type-check BACKEND and tests
        run: uv run --locked mypy BACKEND tests | tee certification-evidence/mypy.txt

      - name: Test
        if: always()
        run: >-
          uv run --locked pytest
          --junitxml=certification-evidence/pytest-results.xml
          --cov-report=xml:certification-evidence/coverage.xml
          --cov-report=json:certification-evidence/coverage.json

      - name: Report test failures
        if: failure() && hashFiles('certification-evidence/pytest-results.xml') != ''
        run: >-
          python -c "import xml.etree.ElementTree as E;
          root=E.parse('certification-evidence/pytest-results.xml').getroot();
          failures=root.findall('.//failure') + root.findall('.//error');
          [print('::error title=Pytest failure::' +
          ((item.text or item.get('message') or 'test failed')
          .replace('%','%25').replace('\r','%0D').replace('\n','%0A')))
          for item in failures]"

      - name: Verify PostgreSQL 17 integration tests without skips
        if: always()
        run: uv run --locked pytest -m integration --no-cov -q

      - name: Verify migration suite against PostgreSQL 17 without skips
        if: always()
        run: uv run --locked pytest -m migration --no-cov -q

      - name: Certify PostgreSQL backup and restore
        if: always()
        run: uv run --locked python database/certify_restore.py

      - name: Verify audit suite against PostgreSQL 17 without skips
        if: always()
        run: uv run --locked pytest -m audit --no-cov -q

      - name: Verify persistence kernel against PostgreSQL 17 without skips
        if: always()
        run: uv run --locked pytest -m persistence_kernel --no-cov -q

      - name: Verify identity compatibility foundation without skips
        if: always()
        run: uv run --locked pytest -m identity_compatibility --no-cov -q

      - name: Verify session persistence suite without skips
        if: always()
        run: uv run --locked pytest -m session_persistence --no-cov -q

      - name: Verify authentication foundation without skips
        if: always()
        run: uv run --locked pytest -m authentication --no-cov -q

      - name: Verify authorization foundation without skips
        if: always()
        run: uv run --locked pytest -m authorization --no-cov -q

      - name: Verify support foundation without skips
        if: always()
        run: uv run --locked pytest -m support --no-cov -q

      - name: Scan Python source
        if: always()
        run: >-
          uv run --locked bandit -f json
          -o certification-evidence/bandit.json -c pyproject.toml -r
          BACKEND ayo.py database/certify_restore.py

      - name: Audit installed dependencies
        if: always()
        run: >-
          uv run --locked pip-audit
          --format=json --output=certification-evidence/pip-audit.json

      - name: Install pinned Gitleaks
        if: always()
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_LINUX_X64_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl --fail --location --silent --show-error \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${archive}" \
            --output "${RUNNER_TEMP}/${archive}"
          echo "${GITLEAKS_LINUX_X64_SHA256}  ${RUNNER_TEMP}/${archive}" | sha256sum --check
          tar -xzf "${RUNNER_TEMP}/${archive}" -C "${RUNNER_TEMP}" gitleaks
          "${RUNNER_TEMP}/gitleaks" version | tee certification-evidence/gitleaks-version.txt

      - name: Scan repository secrets
        if: always()
        run: >-
          "${RUNNER_TEMP}/gitleaks" dir .
          --no-banner
          --redact=100
          --report-format=json
          --report-path=certification-evidence/gitleaks.json

      - name: Retain certification evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ayo-rqc-1-${{ github.sha }}
          path: certification-evidence/
          if-no-files-found: error
