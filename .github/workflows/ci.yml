name: Backend CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-security:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:17.10-bookworm
        env:
          POSTGRES_DB: ayo_test
          POSTGRES_PASSWORD: ayo_test_password
          POSTGRES_USER: ayo_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ayo_test -d ayo_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AYO_TEST_DATABASE_URL: postgresql+psycopg://ayo_test:ayo_test_password@127.0.0.1:5432/ayo_test
      DEBUG: "true"
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version-file: .python-version

      - name: Install uv
        run: python -m pip install "uv==0.11.28"

      - name: Install locked dependencies
        run: uv sync --locked --all-groups

      - name: Verify lock file is current
        run: uv lock --check

      - name: Check formatting
        run: uv run --locked ruff format --check .

      - name: Lint
        run: uv run --locked ruff check .

      - name: Test
        run: uv run --locked pytest

      - name: Scan Python source
        run: uv run --locked bandit -c pyproject.toml -r BACKEND ayo.py

      - name: Audit installed dependencies
        run: uv run --locked pip-audit
